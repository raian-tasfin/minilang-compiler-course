name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # Linux
      #
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            flex \
            bison \
            graphviz

      #
      # Windows (MSYS2 + MinGW)
      #
      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make
            flex
            bison
            mingw-w64-ucrt-x86_64-graphviz

      #
      # Build
      #
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make
